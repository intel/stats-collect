permissions:
  contents: "read"

on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        required: false
        default: 'ubuntu-latest'
      pepc_repo:
        type: string
        required: false
        default: 'intel-innersource/applications.validation.server-powerlab.pepc'
    secrets:
      PEPC_READ_TOKEN:
        required: false

# Define the jobs to run in this workflow
jobs:
  checks:
    name: "Check with python-${{ matrix.python-version }}"
    runs-on: ${{ inputs.runs_on }}

    # Define a matrix strategy to run the job for multiple Python versions
    strategy:
      # Ensure all matrix jobs run even if one fails
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: "Install packages"
        run: |
          sudo -E apt-get -o Acquire::Retries=30 -qq update
          sudo -E apt-get -o Acquire::Retries=30 -qq -y install file rsync

      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

# The commented part below implements parallell test execution with up to 16 workers. But
# coverage always shows 0%, so does not seem to work.
#      - name: "Install dependencies"
#        run: |
#            python -m pip install --upgrade pip
#            pip install --upgrade .
#            pip install pytest pytest-xdist pytest-cov coverage
#
#      - name: "Run pytest to execute tests and collect coverage data"
#        run: |
#            nproc=$(grep -c ^processor /proc/cpuinfo 2>/dev/null || echo 1)
#            [ "$nproc" -le 16 ] || nproc=16
#            pytest -v --numprocesses "$nproc" --cov=statscollectlibs --cov=statscollecttools --cov=statscollectwls --cov-append
      - name: "Checkout pepc"
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.pepc_repo }}
          token: ${{ secrets.PEPC_READ_TOKEN }}
          path: pepc

      # The workspace directory is the stats-collect checkout (not a parent of it), so 'path: pepc'
      # places pepc inside stats-collect. But tests require both projects at the same level:
      #   Actual layout:          Required layout:
      #     parent/                 parent/
      #     └── stats-collect/      ├── stats-collect/
      #         ├── pepc/           │   └── <sources>
      #         └── <sources>       └── pepc/  <- symlink to stats-collect/pepc/
      # Create a symlink one level up to achieve the required layout.
      - name: "Create pepc sibling symlink"
        run: ln -s "$GITHUB_WORKSPACE/pepc" "${GITHUB_WORKSPACE%/*}/pepc"

      - name: "Install dependencies"
        run: |
            python -m pip install --upgrade pip
            pip install --upgrade ./pepc
            pip install --upgrade .
            pip install pytest coverage

      - name: "Run pytest to execute tests and collect coverage data"
        run: |
            coverage run --module pytest -v
        env:
          SHELL: /bin/sh

      - name: "Display the test coverage report"
        run: |
          if [ -e .coverage ]; then
            coverage report
          fi
